<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donezo</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="components/column/column.css" />
</head>
<body>

  <header class="header">
    <span class="header__logo">Donezo<span class="header__logo-dot">.</span></span>
  </header>

  <main class="board" id="BOARD" role="main">

    <div class="column column--done"  id="COL_DONE"  role="region" aria-label="Done column"></div>
  </main>

  <script type="module" src="pages/board/board.js"></script>
</body>
</html>
